<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2K Snake Game</title>

    <!-- Link to CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🐍 Y2K Snake Game 🐍</h1>

        <div class="score">
            Score: <span id="score">0</span>
        </div>

        <!-- Game Board -->
        <canvas id="game" width="400" height="400"></canvas>

        <div class="buttons">
            <button id="startBtn">Start Game</button>
            <button id="restartBtn">Restart</button>
        </div>

        <!-- Mobile Controls -->
        <div class="controls">

            <button onclick="changeDirection('up')">⬆</button>

            <div>
                <button onclick="changeDirection('left')">⬅</button>

                <button onclick="changeDirection('right')">➡</button>
            </div>

            <button onclick="changeDirection('down')">⬇</button>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
